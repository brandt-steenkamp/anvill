name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Anvill
        run: |
          xcodebuild \
            -project Anvill.xcodeproj \
            -scheme Anvill \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Find built app
        run: |
          find build/Build/Products -name "*.app"

      - name: Zip app
        run: |
          cd build/Build/Products/Release
          zip -r Anvill-macOS.zip Anvill.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anvill-macOS
          path: build/Build/Products/Release/Anvill-macOS.zip
